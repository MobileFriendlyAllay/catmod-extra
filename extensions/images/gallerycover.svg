    <svg width="100%" height="100%" viewBox="0 0 1920 1080" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
        <defs>
            <!-- Glow Filter for the Character -->
            <filter id="catGlow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur in="SourceAlpha" stdDeviation="25" result="blur" />
                <feFlood flood-color="#00c3ff" result="color" />
                <feComposite in="color" in2="blur" operator="in" result="glow" />
                <feMerge>
                    <feMergeNode in="glow" />
                    <feMergeNode in="glow" />
                    <feMergeNode in="SourceGraphic" />
                </feMerge>
            </filter>
            
            <!-- Radial Gradient for the background "burst" -->
            <radialGradient id="auraGradient" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#00c3ff" stop-opacity="0.2" />
                <stop offset="100%" stop-color="#00c3ff" stop-opacity="0" />
            </radialGradient>
        </defs>

        <title>CatMod Extension Gallery - Official Banner</title>
        
        <!-- Deep Tech Background -->
        <rect width="1920" height="1080" fill="#0f172a"/>
        
        <!-- Grid Pattern Overlay -->
        <g stroke="#ffffff" stroke-opacity="0.02" stroke-width="1">
            <path d="M0,0 H1920 M0,100 H1920 M0,200 H1920 M0,300 H1920 M0,400 H1920 M0,500 H1920 M0,600 H1920 M0,700 H1920 M0,800 H1920 M0,900 H1920 M0,1000 H1920"/>
            <path d="M0,0 V1080 M100,0 V1080 M200,0 V1080 M300,0 V1080 M400,0 V1080 M500,0 V1080 M600,0 V1080 M700,0 V1080 M800,0 V1080 M900,0 V1080 M1000,0 V1080 M1100,0 V1080 M1200,0 V1080 M1300,0 V1080 M1400,0 V1080 M1500,0 V1080 M1600,0 V1080 M1700,0 V1080 M1800,0 V1080 M1900,0 V1080"/>
        </g>
    
        <g transform="translate(960, 500)">
            <!-- Background Aura -->
            <circle r="500" fill="url(#auraGradient)" />
            
            <!-- Glowing Orbit Rings -->
            <circle r="460" fill="none" stroke="#64748b" stroke-width="2" stroke-opacity="0.2"/>
            <circle r="440" fill="none" stroke="#00c3ff" stroke-width="6" stroke-dasharray="20 40" stroke-opacity="0.5"/>
            <circle r="480" fill="none" stroke="#ff8c1a" stroke-width="2" stroke-dasharray="5 15" stroke-opacity="0.3"/>
            
            <!-- Main Character with Glow Effect -->
            <g transform="translate(-180, -260) scale(3)" filter="url(#catGlow)">
                <image 
                    width="122.6" 
                    height="140.1" 
                    xlink:href="data:image/svg+xml;base64,"
                />
            </g>
            
            <!-- Branding Block with Gallery Text -->
            <g transform="translate(0, 310)">
                <rect x="-350" y="-80" width="700" height="180" rx="40" fill="#ff8c1a" filter="drop-shadow(0 15px 25px rgba(255,140,26,0.4))"/>
                <text x="0" y="0" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="95" fill="#ffffff" letter-spacing="-2">CATMOD</text>
                <text x="0" y="65" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="30" fill="#ffffff" opacity="0.9" letter-spacing="4">EXTENSION GALLERY</text>
            </g>
            
            <!-- Tech Floating Icons -->
            <g transform="translate(-550, -350)" fill="#00c3ff" stroke="#ffffff" stroke-width="2" opacity="0.8">
                <rect width="100" height="100" rx="20"/>
                <path d="M 50,25 V 75 M 25,50 H 75" stroke-width="8" stroke-linecap="round"/>
            </g>
            <g transform="translate(450, -350)" fill="#64748b" stroke="#ffffff" stroke-width="2" opacity="0.8">
                <rect width="100" height="100" rx="20"/>
                <path d="M 35,35 L 65,65 M 65,35 L 35,65" stroke-width="8" stroke-linecap="round"/>
            </g>
        </g>
    </svg>

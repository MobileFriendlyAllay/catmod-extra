<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <!-- Background Square matching your extension color -->
    <rect width="512" height="512" rx="40" fill="#444444"/>
    
    <!-- Mobile Device Frame -->
    <rect x="106" y="60" width="300" height="392" rx="30" stroke="white" stroke-width="20" fill="none"/>
    
    <!-- Joystick (Left Side) -->
    <circle cx="180" cy="340" r="35" stroke="white" stroke-width="12" fill="none"/>
    <circle cx="180" cy="340" r="12" fill="white"/>
    
    <!-- Numpad/Buttons (Right Side) -->
    <rect x="270" y="310" width="30" height="30" rx="4" fill="white"/>
    <rect x="310" y="310" width="30" height="30" rx="4" fill="white"/>
    <rect x="270" y="350" width="30" height="30" rx="4" fill="white"/>
    <rect x="310" y="350" width="30" height="30" rx="4" fill="white"/>
    
    <!-- Keyboard Layout (Top Section) -->
    <line x1="150" y1="140" x2="362" y2="140" stroke="white" stroke-width="12" stroke-linecap="round"/>
    <line x1="150" y1="180" x2="330" y2="180" stroke="white" stroke-width="12" stroke-linecap="round"/>
    <line x1="150" y1="220" x2="350" y2="220" stroke="white" stroke-width="12" stroke-linecap="round"/>
    
    <!-- Top Notch/Speaker -->
    <rect x="226" y="85" width="60" height="10" rx="5" fill="white"/>
</svg>

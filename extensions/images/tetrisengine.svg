<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <!-- Background Square (Default Extension Green) -->
    <rect width="512" height="512" rx="40" fill="#0fbd8c"/>
    
    <!-- Tetris Board/Grid Layout -->
    <g transform="translate(106, 60)">
        <!-- The Game "Well" or Container -->
        <rect width="300" height="400" rx="20" fill="none" stroke="white" stroke-width="16" opacity="0.3"/>
        
        <!-- Tetromino Blocks -->
        <!-- L-Piece (Vertical) -->
        <g transform="translate(40, 240)">
            <rect x="0" y="0" width="40" height="40" rx="4" fill="white"/>
            <rect x="0" y="40" width="40" height="40" rx="4" fill="white"/>
            <rect x="0" y="80" width="40" height="40" rx="4" fill="white"/>
            <rect x="40" y="80" width="40" height="40" rx="4" fill="white"/>
        </g>
        
        <!-- T-Piece (Middle) -->
        <g transform="translate(120, 320)">
            <rect x="0" y="0" width="40" height="40" rx="4" fill="white"/>
            <rect x="40" y="0" width="40" height="40" rx="4" fill="white"/>
            <rect x="80" y="0" width="40" height="40" rx="4" fill="white"/>
            <rect x="40" y="-40" width="40" height="40" rx="4" fill="white"/>
        </g>
        
        <!-- Square Piece (Bottom Right) -->
        <g transform="translate(200, 320)">
            <rect x="0" y="0" width="40" height="40" rx="4" fill="white"/>
            <rect x="40" y="0" width="40" height="40" rx="4" fill="white"/>
            <rect x="0" y="40" width="40" height="40" rx="4" fill="white"/>
            <rect x="40" y="40" width="40" height="40" rx="4" fill="white"/>
        </g>
        
        <!-- "Ghost" Piece / Falling Piece (Top) -->
        <g transform="translate(120, 40)">
            <rect x="0" y="0" width="40" height="40" rx="4" fill="white" opacity="0.9"/>
            <rect x="40" y="0" width="40" height="40" rx="4" fill="white" opacity="0.9"/>
            <rect x="80" y="0" width="40" height="40" rx="4" fill="white" opacity="0.9"/>
            <rect x="120" y="0" width="40" height="40" rx="4" fill="white" opacity="0.9"/>
            <!-- Falling Animation Indicator -->
            <path d="M80 60 v40 l10 -10 m-20 0 l10 10" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
                <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite" />
            </path>
        </g>
    </g>

    <!-- Glossy Overlay -->
    <path d="M40 40 q0 -20 20 -20 h392 q20 0 20 20 v100 q-256 50 -432 0 z" fill="white" opacity="0.05"/>
</svg>
